<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ServerMiser Dashboard</title>
    <link rel="icon" type="image/x-icon" href="/favicon.png"/>

    <!-- Open Graph Meta Tags for Discord & Social Embeds -->
    <meta property="og:title" content="ServerMiser" />
    <meta property="og:description" content="The only bot you will ever need. Take complete control of your guild with ServerMiser's advanced utilities, real-time statistical analytics, and clean layout setup parameters." />
    <meta property="og:url" content="https://servermiser.is-a.dev" />
    
    <!-- Link referencing your banner file inside public -->
    <meta property="og:image" content="https://servermiser.is-a.dev/ServerMiser_banner_discord.jpg" />
    <meta property="og:type" content="website" />
    
    <!-- Theme Color (Dark purplish blue vertical accent bar) -->
    <meta name="theme-color" content="#181a30" />

    <!-- Big layout display mode configuration for banners -->
    <meta name="twitter:card" content="summary_large_image" />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
